name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver without v (e.g. 0.1.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  # Match local Windows kit: D:\Qt\6.11.1\mingw_64
  QT_VERSION: "6.11.1"
  BUILD_TYPE: Release
  ARACHNEL_FAST_BUILD: "0"
  ARACHNEL_QT_KIT: mingw_64
  SCCACHE_GHA_ENABLED: "true"
  CMAKE_C_COMPILER_LAUNCHER: sccache
  CMAKE_CXX_COMPILER_LAUNCHER: sccache

jobs:
  build-windows:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install Qt (MinGW)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: win64_mingw
          modules: qtshadertools qtmultimedia
          tools: tools_mingw1310 tools_opensslv3_x64
          cache: true
          # aqtinstall 3.3.0 cannot resolve Qt 6.11+ Windows layout yet
          aqtsource: git+https://github.com/miurahr/aqtinstall.git

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      # Ninja on Windows cannot CreateProcess("sccache") — needs full path to sccache.exe
      - name: Resolve sccache path for CMake
        shell: pwsh
        run: |
          $path = $env:SCCACHE_PATH
          if ($path -and (Test-Path -LiteralPath "$path.exe")) { $path = "$path.exe" }
          elseif (-not ($path -and (Test-Path -LiteralPath $path))) {
            $cmd = Get-Command sccache -ErrorAction SilentlyContinue
            if ($cmd) { $path = $cmd.Source }
          }
          if (-not $path) { throw "sccache not found" }
          Write-Host "CMAKE_*_COMPILER_LAUNCHER=$path"
          "CMAKE_C_COMPILER_LAUNCHER=$path" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CMAKE_CXX_COMPILER_LAUNCHER=$path" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache FetchContent (Boost / libtorrent / QmlMaterial)
        uses: actions/cache@v4
        with:
          path: .cache/fetchcontent
          key: fetchcontent-win-${{ hashFiles('cmake/ArachnelLibtorrent.cmake', 'CMakeLists.txt', 'cmake/patch-qml-material-win.cmake') }}
          restore-keys: |
            fetchcontent-win-

      - name: Install build tools
        shell: pwsh
        run: |
          choco install ninja -y --no-progress --allow-downgrade
          choco install pkgconfiglite -y --no-progress --allow-downgrade
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::warning::pkgconfiglite install failed (non-fatal on Windows)"
            exit 0
          }

      - name: Add MinGW to PATH
        shell: pwsh
        run: |
          $candidates = @(
            "${env:IQTA_TOOLS}\mingw1310_64\bin",
            "${env:QT_ROOT_DIR}\..\..\Tools\mingw1310_64\bin",
            "${env:QT_ROOT_DIR}\..\Tools\mingw1310_64\bin"
          )
          $mingwBin = $candidates | Where-Object { Test-Path (Join-Path $_ 'g++.exe') } | Select-Object -First 1
          if (-not $mingwBin) {
            Get-ChildItem -Path "${env:RUNNER_WORKSPACE}","${env:QT_ROOT_DIR}" -Recurse -Filter 'g++.exe' -ErrorAction SilentlyContinue |
              Select-Object -First 5 FullName
            throw "MinGW g++.exe not found after Qt install"
          }
          Write-Host "MinGW: $mingwBin"
          echo $mingwBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build installer
        shell: pwsh
        env:
          BUILD_TYPE: ${{ env.BUILD_TYPE }}
          ARACHNEL_FAST_BUILD: ${{ env.ARACHNEL_FAST_BUILD }}
          ARACHNEL_VERSION: ${{ inputs.version }}
          ARACHNEL_QT_KIT: ${{ env.ARACHNEL_QT_KIT }}
          CMAKE_PREFIX_PATH: ${{ env.QT_ROOT_DIR }}
          FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.cache/fetchcontent
        run: |
          git lfs install
          .\run.ps1 --installer

      - name: sccache stats
        if: always()
        shell: pwsh
        run: sccache --show-stats

      - name: Sign installer (optional)
        shell: pwsh
        run: .\scripts\ci\sign-windows.ps1 -Files Arachnel-Setup.exe

      - name: Rename artifact
        shell: pwsh
        run: |
          $v = "${{ inputs.version }}"
          Move-Item -LiteralPath Arachnel-Setup.exe -Destination "Arachnel-$v-Setup.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: Arachnel-${{ inputs.version }}-Setup.exe
          if-no-files-found: error

  build-linux:
    name: Linux AppImage
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git git-lfs curl ca-certificates fuse libfuse2 file ninja-build patchelf \
            libgl1 libglib2.0-0 libxkbcommon0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 \
            libxcb-shape0 libxcb-xfixes0 libxcb-xinerama0 libxcb-xinput0 \
            libdbus-1-3 libpulse0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: linux_gcc_64
          modules: qtshadertools qtmultimedia
          cache: true
          aqtsource: git+https://github.com/miurahr/aqtinstall.git

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Resolve sccache path for CMake
        run: |
          path="${SCCACHE_PATH:-$(command -v sccache)}"
          echo "CMAKE_C_COMPILER_LAUNCHER=$path" >> "$GITHUB_ENV"
          echo "CMAKE_CXX_COMPILER_LAUNCHER=$path" >> "$GITHUB_ENV"
          echo "CMAKE_*_COMPILER_LAUNCHER=$path"

      - name: Cache FetchContent (Boost / libtorrent / QmlMaterial)
        uses: actions/cache@v4
        with:
          path: .cache/fetchcontent
          key: fetchcontent-linux-${{ hashFiles('cmake/ArachnelLibtorrent.cmake', 'CMakeLists.txt', 'cmake/patch-qml-material-win.cmake') }}
          restore-keys: |
            fetchcontent-linux-

      - name: Cache linuxdeploy tools
        uses: actions/cache@v4
        with:
          path: dist-linux/linuxdeploy
          key: linuxdeploy-tools-v1

      - name: Build AppImage
        env:
          ARACHNEL_VERSION: ${{ inputs.version }}
          CMAKE_PREFIX_PATH: ${{ env.QT_ROOT_DIR }}
          FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.cache/fetchcontent
        run: |
          git lfs install
          bash scripts/ci/package-appimage.sh

      - name: sccache stats
        if: always()
        run: sccache --show-stats

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist-linux/Arachnel-${{ inputs.version }}-x86_64.AppImage
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          cp "artifacts/windows-installer/Arachnel-${{ inputs.version }}-Setup.exe" release/
          cp "artifacts/linux-appimage/Arachnel-${{ inputs.version }}-x86_64.AppImage" release/
          cd release
          sha256sum * > checksums.sha256

      - name: Generate changelog
        run: bash scripts/ci/generate-changelog.sh "${{ inputs.version }}" RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Arachnel v${{ inputs.version }}
          body_path: RELEASE_NOTES.md
          prerelease: ${{ inputs.prerelease }}
          files: |
            release/Arachnel-${{ inputs.version }}-Setup.exe
            release/Arachnel-${{ inputs.version }}-x86_64.AppImage
            release/checksums.sha256
